<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>极简倒计时</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .date-text {
      font-size: 1.2rem;
      color: #aaa;
      margin-bottom: 10px;
      font-weight: 300;
    }
    .time-text {
      font-size: 4.5rem;
      font-weight: 200;
      letter-spacing: 4px;
      margin-bottom: 30px;
      font-variant-numeric: tabular-nums;
    }
    .section-title {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .target-picker {
      margin: 20px 0 15px;
    }
    .target-picker input {
      background: transparent;
      border: 1px solid #444;
      color: white;
      padding: 10px 15px;
      border-radius: 30px;
      font-size: 1rem;
      text-align: center;
      width: 220px;
      outline: none;
    }
    .countdown-display {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin: 10px 0 20px;
      font-variant-numeric: tabular-nums;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
    .btn.start { color: #4cd964; }
    .btn.pause { color: #ff9500; }
    .btn.reset { color: #ff3b30; }
    .alarm-text {
      font-size: 1.5rem;
      margin-top: 10px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
<div class="container">
  <div class="date-text" id="dateDisplay"></div>
  <div class="time-text" id="timeDisplay"></div>

  <div class="section-title">目标时刻</div>
  <div class="target-picker">
    <input type="datetime-local" id="targetInput">
  </div>

  <div class="countdown-display" id="countdownDisplay">-- : -- : --</div>

  <div id="alarmMsg" style="height: 30px;"></div>

  <div class="buttons">
    <button class="btn start" id="startBtn" title="开始/继续">▶</button>
    <button class="btn pause" id="pauseBtn" title="暂停">⏸</button>
    <button class="btn reset" id="resetBtn" title="重置">↺</button>
  </div>
</div>

<script>
  // ========== 显示当前日期和时间 ==========
  function updateClock() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('zh-CN', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
    const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
    document.getElementById('dateDisplay').textContent = dateStr;
    document.getElementById('timeDisplay').textContent = timeStr;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ========== 倒计时逻辑 ==========
  let targetDate = null;
  let timerInterval = null;
  let isPaused = false;
  let remaining = 0;

  const countdownEl = document.getElementById('countdownDisplay');
  const targetInput = document.getElementById('targetInput');
  const alarmMsg = document.getElementById('alarmMsg');

  // 默认目标：明天此时
  const defaultTarget = new Date(Date.now() + 86400000);
  targetInput.value = defaultTarget.toISOString().slice(0, 16);
  targetDate = new Date(targetInput.value);
  calcRemaining();

  targetInput.addEventListener('change', () => {
    targetDate = new Date(targetInput.value);
    resetTimer();
  });

  function calcRemaining() {
    const now = new Date();
    remaining = Math.max(0, Math.floor((targetDate - now) / 1000));
    renderCountdown();
  }

  function renderCountdown() {
    if (remaining <= 0) {
      countdownEl.textContent = '00 : 00 : 00';
      return;
    }
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    const days = Math.floor(h / 24);
    const hours = h % 24;
    if (days > 0) {
      countdownEl.textContent = `${days}天 ${String(hours).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    } else {
      countdownEl.textContent = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
    }
  }

  function startTimer() {
    if (remaining <= 0) {
      alert('请设置一个未来的时间');
      return;
    }
    if (timerInterval && !isPaused) return; // 已经在运行
    if (isPaused) {
      isPaused = false;
      timerInterval = setInterval(tick, 1000);
      return;
    }
    // 全新开始
    stopTimer();
    calcRemaining();
    isPaused = false;
    timerInterval = setInterval(tick, 1000);
  }

  function pauseTimer() {
    if (!timerInterval || isPaused) return;
    isPaused = true;
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function resetTimer() {
    stopTimer();
    isPaused = false;
    calcRemaining();
    alarmMsg.innerHTML = '';
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function tick() {
    if (remaining <= 0) {
      stopTimer();
      alarmMsg.innerHTML = '<div class="alarm-text">⏰ 时间到！</div>';
      // 尝试震动（iOS 需要用户交互后才能用，但放在点击处理里可以）
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate([200, 100, 200]);
      }
      return;
    }
    remaining--;
    renderCountdown();
    if (remaining === 0) {
      stopTimer();
      alarmMsg.innerHTML = '<div class="alarm-text">⏰ 时间到！</div>';
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(500);
      }
    }
  }

  document.getElementById('startBtn').addEventListener('click', startTimer);
  document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
  document.getElementById('resetBtn').addEventListener('click', resetTimer);

  // 注册 Service Worker 让 PWA 可离线工作
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
